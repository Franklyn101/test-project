<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Payment Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    form {
      max-width: 400px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, button {
      padding: 10px;
      font-size: 1rem;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .modal-content button {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <form id="paymentForm">
    <input type="text" id="cardName" placeholder="Cardholder Name" required />
    <input type="text" id="cardNumber" placeholder="Card Number" maxlength="16" required />
    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required />
    <input type="text" id="cvv" placeholder="CVV" maxlength="4" required />
    <button type="submit">Pay</button>
  </form>

  <div id="paymentModal" class="modal">
    <div class="modal-content">
      <p>Payment submitted successfully!</p>
      <button id="closePaymentModal">Close</button>
    </div>
  </div>

  <script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const cardName = document.getElementById('cardName').value.trim();
      const cardNumber = document.getElementById('cardNumber').value.trim();
      const expiry = document.getElementById('expiry').value.trim();
      const cvv = document.getElementById('cvv').value.trim();

      const isValid =
        cardName &&
        /^\d{16}$/.test(cardNumber) &&
        /^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry) &&
        /^\d{3,4}$/.test(cvv);

      if (!isValid) {
        alert('Please fill in all fields correctly.');
        return;
      }

      document.getElementById('paymentModal').style.display = 'flex';
    });

    document.getElementById('closePaymentModal').addEventListener('click', function() {
      document.getElementById('paymentModal').style.display = 'none';

    });
  </script>

</body>
</html>
